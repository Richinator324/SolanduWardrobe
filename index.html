<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Tribe Wardrobe</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <img src="./textures/water_tribe_logo.png" alt="Water Tribe Logo" />
        <h1>Water Tribe Wardrobe</h1>
    </header>
    <div id="container">
        <div id="controls">
            <h1>Upload or Search</h1>
            <input type="file" id="upload" accept=".png" />
            <input type="text" id="username" placeholder="Enter Minecraft Username" />
            <button id="searchButton">Search</button>
            
            <!-- Custom-styled dropdown for clothing -->
            <label for="clothingSelect">Choose Outfit:</label>
            <div class="custom-select">
                <select id="clothingSelect">
                    <option value="warrior1">Warrior 1</option>
                    <option value="warrior2">Warrior 2</option>
                    <option value="female">Female Outfit</option>
                    <option value="outfit">Outfit</option>
                </select>
            </div>

            <button id="downloadButton" style="display: none;">Download Skin</button>
        </div>
        <div id="viewer">
            <canvas id="skinViewer"></canvas>
        </div>
    </div>
    <script src="./main.js" type="module"></script>
</body>
</html>
